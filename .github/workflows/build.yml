name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout project files
      uses: actions/checkout@v4
      with:
        path: main-project

    - name: Checkout Android Template
      uses: actions/checkout@v4
      with:
        repository: 'vimalcvs/Android-WebView-App-Template'
        path: template

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Inject HTML into Template
      run: |
        rm -rf template/app/src/main/assets/*
        cp -r main-project/* template/app/src/main/assets/ || true
        rm -rf template/app/src/main/assets/template
        rm -rf template/app/src/main/assets/main-project

    - name: Build APK with Gradle
      run: |
        cd template
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KrdOnlineTV-APK
        path: template/app/build/outputs/apk/debug/app-debug.apk
